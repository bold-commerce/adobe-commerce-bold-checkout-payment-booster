name: Local Integration Tests
run-name: Local Integration Tests (act)

# ─────────────────────────────────────────────────────────────────────────────
# This workflow is designed to be run locally with `act`.
# It has NO services: block — all four backing services (MariaDB, Redis,
# OpenSearch, RabbitMQ) must be pre-started by scripts/start-opensearch.sh
# before invoking act.
#
# Usage:
#   ./scripts/start-opensearch.sh          # start all four backing services
#   act workflow_dispatch \
#     -W .github/workflows/local-integration-tests.yml
#
# Run only CreateTest (or any PHPUnit --filter value):
#   act workflow_dispatch \
#     -W .github/workflows/local-integration-tests.yml \
#     --input test_filter=CreateTest
# Or full class name:
#   --input test_filter='Bold\CheckoutPaymentBooster\Test\Integration\Service\ExpressPay\Order\CreateTest'
#
# For local act runs, Magento repo credentials are optional: if COMPOSER_MAGENTO_USERNAME
# is not set, the add-credentials step is skipped. Ensure your global Composer already
# has repo.magento.com credentials (e.g. composer config -g http-basic.repo.magento.com USER PASS).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Run only this test (PHPUnit --filter). Example: CreateTest or Bold\CheckoutPaymentBooster\Test\Integration\Service\ExpressPay\Order\CreateTest'
        required: false
        type: string

permissions:
  contents: read

jobs:
  setup-and-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          # PHP 8.4 / 2.4.8-p1 is validated on GitHub CI (native x86-64 Linux).
          # Magento's TestFramework still calls getTestResultObject() which was
          # removed in PHPUnit 11 (required by PHP 8.4), so that combination
          # fails under act on Apple Silicon. Use 8.2 combinations for local runs.
          - php-version: "8.2"
            magento-version: "2.4.8"
            composer-version: "v2"
            maria-db-version: "10.6"
          - php-version: "8.2"
            magento-version: "2.4.6-p10"
            composer-version: "v2"
            maria-db-version: "10.6"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # act runs with --network host, so all manually-started services (MariaDB,
      # Redis, OpenSearch, RabbitMQ) are on 127.0.0.1. Map their hostnames so the
      # Magento install-config can resolve them by name.
      - name: map-service-hostnames
        run: |
          sudo tee -a /etc/hosts << 'EOF'
          127.0.0.1 tmp-mysql
          127.0.0.1 opensearch
          127.0.0.1 redis
          127.0.0.1 rabbitmq
          EOF

      - name: verify-services
        run: |
          check() {
            local name=$1 host=$2 port=$3
            echo -n "── ${name} (${host}:${port}) "
            if timeout 3 bash -c "echo > /dev/tcp/${host}/${port}" 2>/dev/null; then
              echo "✅"
            else
              echo "❌  not reachable — run ./scripts/start-opensearch.sh first"
              exit 1
            fi
          }
          check "MariaDB"    127.0.0.1 3306
          check "Redis"      127.0.0.1 6379
          check "OpenSearch" 127.0.0.1 9200
          check "RabbitMQ"   127.0.0.1 5672

      - name: Setup ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, pdo_mysql, simplexml, soap, sockets, sodium, xsl, zip
          tools: composer:${{ matrix.composer-version }}

      - name: Setup problem matchers for PHPUnit
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      # Credentials from env (act: --secret-file .secrets injects COMPOSER_MAGENTO_* and GITHUB_TOKEN).
      # No secrets.* in YAML so act's parser accepts the workflow.
      - name: add-credentials
        run: |
          if [ -n "${COMPOSER_MAGENTO_USERNAME:-}" ]; then
            composer config --global http-basic.repo.magento.com "$COMPOSER_MAGENTO_USERNAME" "$COMPOSER_MAGENTO_PASSWORD"
            composer config --global github-oauth.github.com "$GITHUB_TOKEN"
          fi

      - name: install-missing-tools
        run: sudo apt-get install -y rsync mysql-client

      - name: get-magento
        working-directory: integration-pipeline-test
        run: |
          META_PACKAGE=magento/project-community-edition
          META_VERSION=${{ matrix.magento-version }}

          composer create-project --no-install \
            --repository-url=https://repo.magento.com/ \
            "${META_PACKAGE}" /tmp/exampleproject "${META_VERSION}"

          rsync -a /tmp/exampleproject/ ./
          rm -rf /tmp/exampleproject/

      - name: allow-plugins
        working-directory: integration-pipeline-test
        run: |
          composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer config --no-plugins allow-plugins.laminas/laminas-dependency-plugin true
          composer config --no-plugins allow-plugins.magento/* true
          composer config --no-plugins allow-plugins.php-http/discovery true

      - name: install-deps
        working-directory: integration-pipeline-test
        run: |
          set -e
          # Use the locally checked-out module code (path repository) so that
          # local changes are tested without needing a GitHub push.
          # act is invoked from the module root, so github.workspace IS the module directory.
          composer config repositories.adobe-commerce-bold-checkout-payment-booster \
            path "${{ github.workspace }}"
          composer require \
            bold-commerce/module-checkout-payment-booster:@dev \
            --no-scripts --no-update
          # Magento 2.4.6.x pins sebastian/comparator <=4.0.6 but PHPUnit 9.6.33+
          # requires ^4.0.10. Only relax for that version — 2.4.8 needs ^5.0 (PHPUnit 10).
          if [ "${{ matrix.magento-version }}" = "2.4.6-p10" ]; then
            composer require --no-update "sebastian/comparator:^4.0"
          fi
          composer install --prefer-dist --no-progress --no-suggest
          composer require --dev colinodell/psr-testlogger --no-scripts

      - name: copy-configs
        working-directory: integration-pipeline-test
        run: |
          cp install-config-mysql-ci-${{ matrix.magento-version }}.php \
            dev/tests/integration/etc/install-config-mysql.php
          cp dev/tests/integration/etc/config-global.php.dist \
            dev/tests/integration/etc/config-global.php
          cp dev/tests/integration/phpunit.xml.dist \
            dev/tests/integration/phpunit.xml
          # Remove deprecated custom test suite loader attributes (PHPUnit 10)
          sed -i.bak -E 's/ testSuiteLoaderClass="[^"]*"//g; s/ testSuiteLoaderFile="[^"]*"//g' dev/tests/integration/phpunit.xml

      - name: add-DB
        run: |
          mysql -h 127.0.0.1 -u root -proot \
            -e "CREATE DATABASE IF NOT EXISTS magento_integration_tests;"

      - name: run-tests
        working-directory: integration-pipeline-test
        run: |
          # With a path repository Composer symlinks the module, so
          # vendor/…/module-checkout-payment-booster → ${{ github.workspace }}/app/code/Bold/CheckoutPaymentBooster
          FILTER="${{ github.event.inputs.test_filter }}"
          set -- vendor/bin/phpunit \
            -c $(pwd)/dev/tests/integration/phpunit.xml \
            --display-deprecations \
            --testdox
          if [ -n "$FILTER" ]; then
            set -- "$@" --filter "$FILTER"
          fi
          set -- "$@" $(pwd)/vendor/bold-commerce/module-checkout-payment-booster/Test/Integration
          "$@"
